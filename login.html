<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вход</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #080113;
        color: white;
        font-family: Arial, sans-serif;
      }

      .loading {
        text-align: center;
      }

      .spinner {
        margin-top: 20px;
        width: 40px;
        height: 40px;
        border: 4px solid rgba(255, 255, 255, 0.2);
        border-top: 4px solid #a855f7;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div class="loading">
      <h2>Открываем страницу входа...</h2>

      <div class="spinner"></div>
    </div>

    <script>
      setTimeout(() => {
        window.location.href = "https://manga-site-er5s.onrender.com";
      }, 1200);
    </script>
  </body>
</html>
