<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Чтение манги</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="main">
      <div class="reader-page">
        <h1 id="readerTitle"></h1>

        <div id="pageIndicator" class="page-indicator"></div>

        <div id="pagesContainer" class="pages-container"></div>

        <div class="reader-controls">
          <button id="prevBtn">← Предыдущая глава</button>

          <button id="nextBtn">Следующая глава →</button>
        </div>

        <div class="reader-controls">
          <button id="backBtn">Назад к манге</button>
        </div>
      </div>
    </main>

    <script src="js/reader.js"></script>
  </body>
</html>
