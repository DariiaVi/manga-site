<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <title>Lamp Login</title>

    <link rel="stylesheet" href="lamp.css" />
  </head>

  <body>
    <div class="scene">
      <svg class="lamp" viewBox="0 0 200 200">
        <circle id="light" cx="100" cy="90" r="90"></circle>

        <ellipse cx="100" cy="60" rx="60" ry="30" fill="white" />

        <rect x="95" y="60" width="10" height="80" fill="#ddd" />

        <rect x="70" y="140" width="60" height="10" rx="5" fill="#ddd" />

        <line id="rope" x1="120" y1="60" x2="120" y2="105"></line>

        <circle id="pull" cx="120" cy="105" r="6"></circle>
      </svg>

      <div class="login-form">
        <h2>Welcome</h2>

        <input placeholder="Username" />

        <input placeholder="Password" />

        <button>Sign In</button>
      </div>
    </div>

    <script src="lamp.js"></script>
  </body>
</html>
