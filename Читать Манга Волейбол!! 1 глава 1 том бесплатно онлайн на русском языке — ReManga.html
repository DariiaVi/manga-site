ние» и командный дух, Кагэяма — в жёсткий контроль и личное мастерство. Возможно, из-за своих различий, два молодых игрока сформировали отлично действующий дуэт, в который поверили и тренер, и старшие товарищи. Теперь, учась друг у друга и повышая мастерство, наши герои могут вести школу к новым победам. Что там у юных японских волейболистов вместо Косиэна?\u003c/p\u003e","issue_year":2012,"avg_rating":"9.5","cover":{"low":"/media/titles/haikyuu/cover_c9db23b1.webp","mid":"/media/titles/haikyuu/cover_91748fdd.webp","high":"/media/titles/haikyuu/cover_e34f5283.webp"},"wallpaper":{},"creators":[{"id":75,"name":"Viz","cover":{"mid":"/media/creators/cover_db12b5b2.jpeg","high":"/media/creators/cover_94a7c975.jpeg"},"type":3},{"id":76,"name":"Shueisha","cover":{"mid":"/media/creators/cover_bf7bab46.jpeg","high":"/media/creators/cover_5ba4cd1e.jpeg"},"type":3},{"id":1114,"name":"FURUDATE Haruichi","cover":{},"type":4}],"genres":[{"id":11,"name":"Драма","dir":"drama"},{"id":16,"name":"Элементы юмора","dir":"elementjumora"},{"id":21,"name":"Повседневность","dir":"povsednevnost"},{"id":32,"name":"Спорт","dir":"sport"},{"id":39,"name":"Школьники","dir":"shkolnajazhizn"}],"categories":[{"id":64,"name":"ГГ мужчина","dir":"ggmuzhchina"},{"id":127,"name":"Аниме","dir":"anime"}],"is_licensed":false,"uploaded":1,"can_post_comments":true,"is_yaoi":false,"is_erotic":false,"has_voiceover":false,"new_season_date":null,"kodik_imdb_id":"","total_votes":407397,"total_views":1650817,"count_rating":1566,"count_bookmarks":12490,"count_comments":603,"count_cards":342,"count_characters":35,"count_posts":19,"count_chapters":417,"count_collections":3,"count_moments":8,"fresh_rating":"9.41","first_chapter":{"id":34554,"tome":1,"chapter":"1"},"bookmark_type":null,"branches":[{"id":398,"img":{},"subscribed":false,"total_votes":422126,"count_chapters":417,"publishers":[{"id":10510,"name":"ReBots","cover":{"mid":"publishers/rebots/cover_e2b3b8a5.webp","high":"publishers/rebots/cover_434e6ef0.webp"}," :root {
  --bprogress-color: hsl(var(--r-primary));
  --bprogress-height: 2px;
  --bprogress-spinner-size: 18px;
  --bprogress-spinner-animation-duration: 400ms;
  --bprogress-spinner-border-size: 2px;
  --bprogress-box-shadow: 0 0 10px hsl(var(--r-primary)), 0 0 5px hsl(var(--r-primary));
  --bprogress-z-index: 99999;
  --bprogress-spinner-top: 15px;
  --bprogress-spinner-bottom: auto;
  --bprogress-spinner-right: 15px;
  --bprogress-spinner-left: auto;
}

.bprogress {
  width: 0;
  height: 0;
  pointer-events: none;
  z-index: var(--bprogress-z-index);
}

.bprogress .bar {
  background: var(--bprogress-color);
  position: fixed;
  z-index: var(--bprogress-z-index);
  top: 0;
  left: 0;
  width: 100%;
  height: var(--bprogress-height);
}

/* Fancy blur effect */
.bprogress .peg {
  display: block;
  position: absolute;
  right: 0;
  width: 100px;
  height: 100%;
  box-shadow: var(--bprogress-box-shadow);
  opacity: 1.0;
  transform: rotate(3deg) translate(0px, -4px);
}

/* Remove these to get rid of the spinner */
.bprogress .spinner {
  display: block;
  position: fixed;
  z-index: var(--bprogress-z-index);
  top: var(--bprogress-spinner-top);
  bottom: var(--bprogress-spinner-bottom);
  right: var(--bprogress-spinner-right);
  left: var(--bprogress-spinner-left);
}

.bprogress .spinner-icon {
  width: var(--bprogress-spinner-size);
  height: var(--bprogress-spinner-size);
  box-sizing: border-box;
  border: solid var(--bprogress-spinner-border-size) transparent;
  border-top-color: var(--bprogress-color);
  border-left-color: var(--bprogress-color);
  border-radius: 50%;
  -webkit-animation: bprogress-spinner var(--bprogress-spinner-animation-duration) linear infinite;
  animation: bprogress-spinner var(--bprogress-spinner-animation-duration) linear infinite;
}

.bprogress-custom-parent {
  overflow: hidden;
  position: relative;
}

.bprogress-custom-parent .bprogress .spinner,
.bprogress-custom-parent .bprogress .bar {
  position: absolute;
}

.bprogress .indeterminate {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: var(--bprogress-height);
  overflow: hidden;
}

.bprogress .indeterminate .inc,
.bprogress .indeterminate .dec {
  position: absolute;
  top: 0;
  height: 100%;
  background-color: var(--bprogress-color);
}

.bprogress .indeterminate .inc {
  animation: bprogress-indeterminate-increase 2s infinite;
}

.bprogress .indeterminate .dec {
  animation: bprogress-indeterminate-decrease 2s 0.5s infinite;
}

@-webkit-keyframes bprogress-spinner {
  0%   { -webkit-transform: rotate(0deg); transform: rotate(0deg); }
  100% { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
}

@keyframes bprogress-spinner {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes bprogress-indeterminate-increase {
  from { left: -5%; width: 5%; }
  to { left: 130%; width: 100%; }
}

@keyframes bprogress-indeterminate-decrease {
  from { left: -80%; width: 80%; }
  to { left: 110%; width: 10%; }

сти школу к новым победам. Что там у юных японских волейболистов вместо Косиэна?\u003c/p\u003e"])</script><script>self.__next_f.push([1,"6:[\"$\",\"$L4d\",null,{\"state\":{\"mutations\":[],\"queries\":[{\"dehydratedAt\":1773313263360,\"state\":{\"data\":{\"json\":{\"id\":34554,\"tome\":1,\"chapter\":\"1\",\"name\":\"Завершения и истоки\",\"score\":5075,\"upload_date\":\"2018-07-01T21:23:37.789051\",\"is_paid\":false,\"purchase_type\":1,\"title_id\":468,\"volume_id\":null,\"branch_id\":398,\"price\":null,\"pub_date\":null,\"index\":1,\"delay_pub_date\":null,\"is_published\":true,\"server\":{\"id\":2,\"name\":\"img\",\"link\":\"https://img.reimg.org/\",\"fallback_link\":\"https://img.reimg2.org/\"},\"pages\":[[{\"id\":1,\"link\":\"https://img.reimg2.org/images/468/1-1/1_re.jpg\",\"height\":1300,\"width\":906,\"count_comments\":38}],[{\"id\":2,\"link\":\"https://img.reimg2.org/images/468/1-1/2_re.jpg\",\"height\":1452,\"width\":1000,\"count_comments\":45}],[{\"id\":3,\"link\":\"https://img.reimg2.org/images/468/1-1/3_re.jpg\",\"height\":900,\"width\":1440,\"count_comments\":4}],[{\"id\":4,\"link\":\"https://img.reimg2.org/images/468/1-1/4_re.jpg\",\"height\":1400,\"width\":989,\"count_comments\":3}],[{\"id\":5,\"link\":\"https://img.reimg2.org/images/468/1-1/5_re.jpg\",\"height\":1423,\"width\":1000,\"count_comments\":2}],[{\"id\":6,\"link\":\"https://img.reimg2.org/images/468/1-1/6_re.jpg\",\"height\":1417,\"width\":1000,\"count_comments\":3}],[{\"id\":7,\"link\":\"https://img.reimg2.org/images/468/1-1/7_re.jpg\",\"height\":1412,\"width\":1000,\"count_comments\":1}],[{\"id\":8,\"link\":\"https://img.reimg2.org/images/468/1-1/8_re.jpg\",\"height\":1416,\"width\":1000,\"count_comments\":1}],[{\"id\":9,\"link\":\"https://img.reimg2.org/images/468/1-1/9_re.jpg\",\"height\":1415,\"width\":1000,\"count_comments\":3}],[{\"id\":10,\"link\":\"https://img.reimg2.org/images/468/1-1/10_re.jpg\",\"height\":1419,\"width\":1000,\"count_comments\":1}],[{\"id\":11,\"link\":\"https://i
